<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B/X D&D — Character Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --ink:#111111;
  --ink2:#333333;
  --muted:#666666;
  --rule:#cccccc;
  --rule2:#e8e8e8;
  --bg:#ffffff;
  --bg2:#f7f7f7;
  --bg3:#f0f0f0;
  --red:#c0102a;
  --red2:#e01030;
  --red-bg:#fdf2f4;
  --mono:'Share Tech Mono',monospace;
}
html{scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:'Libre Baskerville',Georgia,serif;
  font-size:15px;
  line-height:1.65;
}

/* ── WRAPPER ── */
.wrapper{max-width:960px;margin:0 auto;padding:0 20px 80px}

/* ── HEADER ── */
.site-header{
  border-bottom:3px solid var(--ink);
  padding:36px 0 24px;
  margin-bottom:36px;
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:20px;
  flex-wrap:wrap;
}
.header-left h1{
  font-family:'Playfair Display',serif;
  font-size:clamp(1.5rem,4vw,2.4rem);
  font-weight:900;
  letter-spacing:-0.02em;
  line-height:1.05;
  color:var(--ink);
}
.header-left .subtitle{
  font-size:0.75rem;
  letter-spacing:0.18em;
  text-transform:uppercase;
  color:var(--muted);
  margin-top:5px;
}
.header-right{
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  gap:8px;
}
.btn{
  font-family:'Playfair Display',serif;
  font-size:0.82rem;
  font-weight:700;
  letter-spacing:0.04em;
  padding:10px 24px;
  cursor:pointer;
  border:2px solid var(--ink);
  background:var(--ink);
  color:var(--bg);
  transition:background 0.15s,color 0.15s;
  white-space:nowrap;
}
.btn:hover{background:var(--red);border-color:var(--red);}
.btn:disabled{opacity:0.35;cursor:default;pointer-events:none;}
.btn.outline{background:var(--bg);color:var(--ink);}
.btn.outline:hover{background:var(--ink);color:var(--bg);}
.btn.lang-btn{
  font-size:0.7rem;
  letter-spacing:0.2em;
  padding:6px 14px;
  border-color:var(--rule);
  background:var(--bg);
  color:var(--muted);
}
.btn.lang-btn:hover{background:var(--bg3);color:var(--ink);border-color:var(--ink);}
.btn-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end;}

/* ── ORNAMENT LINE ── */
.orn{
  display:flex;align-items:center;gap:12px;
  margin:28px 0 20px;
  font-family:'Playfair Display',serif;
  font-size:0.65rem;
  letter-spacing:0.3em;
  text-transform:uppercase;
  color:var(--red);
  font-weight:700;
}
.orn::before,.orn::after{content:'';flex:1;height:1px;background:var(--rule);}

/* ── SHEET ── */
#char-sheet{display:none}
#char-sheet.visible{display:block;animation:appear 0.35s ease}
@keyframes appear{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

/* ── IDENTITY BAND ── */
.id-band{
  border:2px solid var(--ink);
  padding:18px 24px;
  margin-bottom:24px;
  display:grid;
  grid-template-columns:1fr auto;
  align-items:center;
  gap:16px;
}
.id-name{
  font-family:'Playfair Display',serif;
  font-size:clamp(1.3rem,3vw,2rem);
  font-weight:900;
  line-height:1.1;
}
.id-sub{
  font-size:0.8rem;
  color:var(--muted);
  margin-top:4px;
  font-style:italic;
}
.id-align{
  text-align:right;
  font-family:'Playfair Display',serif;
}
.align-label{
  font-size:0.65rem;
  letter-spacing:0.2em;
  text-transform:uppercase;
  color:var(--muted);
}
.align-val{
  font-size:1.2rem;
  font-weight:700;
  color:var(--red);
}

/* ── TWO-COL LAYOUT ── */
.sheet-cols{
  display:grid;
  grid-template-columns:280px 1fr;
  gap:24px;
}
@media(max-width:680px){.sheet-cols{grid-template-columns:1fr}}

/* ── SECTION ── */
.section{margin-bottom:22px}
.sec-title{
  font-family:'Playfair Display',serif;
  font-size:0.65rem;
  font-weight:700;
  letter-spacing:0.25em;
  text-transform:uppercase;
  color:var(--red);
  padding-bottom:6px;
  border-bottom:2px solid var(--ink);
  margin-bottom:12px;
}

/* ── ABILITY TABLE ── */
.ability-table{width:100%;border-collapse:collapse}
.ability-table tr{border-bottom:1px solid var(--rule2)}
.ability-table tr:last-child{border-bottom:none}
.ability-table td{padding:7px 6px;vertical-align:middle}
.ab-abbr{
  font-family:var(--mono);
  font-size:0.72rem;
  font-weight:bold;
  color:var(--muted);
  width:36px;
}
.ab-score{
  font-family:var(--mono);
  font-size:1.5rem;
  font-weight:bold;
  width:36px;
  text-align:center;
  line-height:1;
}
.ab-mod{
  font-family:var(--mono);
  font-size:0.9rem;
  width:34px;
  text-align:center;
  font-weight:bold;
}
.mod-pos{color:var(--red)}
.mod-neg{color:#1a6a3a}
.mod-zero{color:var(--muted)}
.ab-effect{font-size:0.75rem;color:var(--muted);font-style:italic;line-height:1.35}
.ab-score.rolling{color:var(--red);animation:blink 0.1s infinite}
@keyframes blink{50%{opacity:0.4}}

/* ── COMBAT GRID ── */
.combat-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
}
.cstat{
  border:1px solid var(--rule);
  padding:10px 8px;
  text-align:center;
  background:var(--bg2);
}
.cstat-label{
  font-size:0.6rem;
  letter-spacing:0.15em;
  text-transform:uppercase;
  color:var(--muted);
  display:block;
  margin-bottom:4px;
}
.cstat-val{
  font-family:var(--mono);
  font-size:1.4rem;
  font-weight:bold;
  color:var(--ink);
  line-height:1;
  display:block;
}
.cstat-sub{font-size:0.7rem;color:var(--muted);display:block;margin-top:3px}

/* ── SAVES ── */
.save-row{
  display:flex;justify-content:space-between;
  padding:5px 0;
  border-bottom:1px solid var(--rule2);
  font-size:0.85rem;
}
.save-row:last-child{border-bottom:none}
.save-name{color:var(--ink2)}
.save-val{font-family:var(--mono);font-weight:bold;color:var(--ink)}

/* ── ABILITIES LIST ── */
.ability-item{margin-bottom:10px}
.ability-item:last-child{margin-bottom:0}
.abil-name{
  font-weight:700;
  font-size:0.85rem;
  color:var(--ink);
  margin-bottom:2px;
}
.abil-desc{font-size:0.8rem;color:var(--muted);line-height:1.45}

/* ── THIEF / CLERIC TABLE ── */
.rules-table{width:100%;border-collapse:collapse;font-size:0.82rem;margin-top:4px}
.rules-table th{
  text-align:left;padding:5px 8px;
  background:var(--ink);color:var(--bg);
  font-family:'Playfair Display',serif;
  font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;
}
.rules-table td{padding:5px 8px;border-bottom:1px solid var(--rule2)}
.rules-table tr:last-child td{border-bottom:none}
.rules-table td:last-child{font-family:var(--mono);text-align:right;color:var(--red)}

/* ── SPELLS ── */
.spell-tag{
  display:inline-block;
  border:1px solid var(--ink);
  font-size:0.75rem;
  padding:3px 10px;
  margin:2px 3px 2px 0;
  font-family:'Playfair Display',serif;
}
.spell-tag.always{border-color:var(--red);color:var(--red)}
.spell-desc{font-size:0.8rem;color:var(--muted);margin-top:8px;font-style:italic;line-height:1.45}

/* ── LANGUAGES ── */
.lang-tag{
  display:inline-block;
  background:var(--bg2);
  border:1px solid var(--rule);
  font-size:0.75rem;
  padding:2px 9px;
  margin:2px 3px 2px 0;
}
.lang-tag.extra{border-color:var(--red);color:var(--red)}

/* ── SHOP ── */
.gold-bar{
  display:flex;align-items:center;gap:12px;
  padding:12px 16px;
  border:2px solid var(--ink);
  margin-bottom:16px;
  background:var(--bg2);
}
.gold-bar .gl{font-family:'Playfair Display',serif;font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted)}
.gold-bar .gv{font-family:var(--mono);font-size:1.5rem;font-weight:bold;margin-left:auto}
.gold-bar .gv.over{color:var(--red)}

.shop-tabs{display:flex;border-bottom:2px solid var(--ink);margin-bottom:14px}
.shop-tab{
  font-family:'Playfair Display',serif;
  font-size:0.72rem;letter-spacing:0.1em;text-transform:uppercase;
  padding:8px 18px;cursor:pointer;
  background:none;border:none;color:var(--muted);
  border-bottom:2px solid transparent;margin-bottom:-2px;
  transition:color 0.15s;
}
.shop-tab:hover{color:var(--ink)}
.shop-tab.active{color:var(--red);border-bottom-color:var(--red);font-weight:700}

.shop-grid{display:flex;flex-direction:column;gap:2px}
.shop-item{
  display:flex;align-items:center;gap:10px;
  padding:7px 10px;border:1px solid var(--rule2);
  cursor:pointer;transition:background 0.1s;
  font-size:0.83rem;
}
.shop-item:hover:not(.disabled){background:var(--bg2)}
.shop-item.disabled{opacity:0.3;cursor:not-allowed}
.shop-item.selected{background:var(--red-bg);border-color:var(--red)}
.shop-item input[type=checkbox]{
  accent-color:var(--red);
  width:14px;height:14px;flex-shrink:0;cursor:pointer;
}
.item-name{flex:1;color:var(--ink)}
.item-dmg{font-family:var(--mono);font-size:0.75rem;color:var(--muted);width:44px;text-align:center}
.item-note{font-size:0.7rem;font-style:italic;color:var(--muted);margin-left:4px}
.item-cost{font-family:var(--mono);font-size:0.8rem;font-weight:bold;width:50px;text-align:right}

/* ── INVENTORY ── */
.inv-list{margin-top:10px}
.inv-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:4px 0;border-bottom:1px solid var(--rule2);
  font-size:0.82rem;
}
.inv-row:last-child{border-bottom:none}
.inv-name{color:var(--ink2)}
.inv-cost{font-family:var(--mono);font-size:0.78rem;color:var(--muted)}

/* ── MISC ── */
.note{font-size:0.75rem;color:var(--muted);font-style:italic;margin-top:6px;line-height:1.4}
hr.rule{border:none;border-top:1px solid var(--rule);margin:14px 0}
.right-col > .section{margin-bottom:22px}

/* ── PRINT ── */
@media print{
  .header-right,.shop-section{display:none!important}
  .site-header{padding:20px 0 16px}
  .sheet-cols{grid-template-columns:260px 1fr}
  body{font-size:13px}
}
</style>
</head>

</div>

const r=n=>Math.floor(Math.random()*n)+1;
const roll=(n,s)=>{let t=0;for(let i=0;i<n;i++)t+=r(s);return t;}
const pick=a=>a[Math.floor(Math.random()*a.length)];
const t=k=>STRINGS[lang][k]; // shorthand for current-lang string
const L=o=>o[lang];           // shorthand for bilingual object

function calcAC(armorId,shield,dexMod){
  let base=9;
  if(armorId==='leather')base=7;
  else if(armorId==='chain')base=5;
  else if(armorId==='plate')base=3;
  return base-dexMod-(shield?1:0);
}
function calcMove(armorId){
  if(armorId==='chain'||armorId==='plate')return"60'";
  if(armorId==='leather')return"90'";
  return"120'";
}
function calcSpent(){
  let sp=0;
  const ai=ARMOR_ITEMS.find(a=>a.id===S.armor);if(ai)sp+=ai.cost;
  if(S.shield)sp+=10;
  S.weapons.forEach(n=>{const w=WEAPONS_DATA.find(x=>L(x.name)===n||x.name.en===n);if(w)sp+=w.cost;});
  S.gear.forEach(n=>{const g=GEAR_DATA.find(x=>L(x.name)===n||x.name.en===n);if(g)sp+=g.cost;});
  return sp;
}
function classScore(cls,st){
  const{STR,INT,WIS,DEX,CON}=st;
  switch(cls){
    case'Fighter':    return STR*1.0+CON*0.35;
    case'Cleric':     return WIS*1.0+STR*0.2;
    case'Magic-User': return INT*1.0+CON*0.1;
    case'Thief':      return DEX*1.0;
    case'Dwarf':      return(STR+CON)*0.55;
    case'Elf':        return(INT+STR)*0.5;
    case'Halfling':   return(DEX+STR)*0.5;
  }return 0;
}
function bestClass(st){
  return['Fighter','Cleric','Magic-User','Thief','Dwarf','Elf','Halfling']
    .sort((a,b)=>classScore(b,st)-classScore(a,st))[0];
}
function xpBonus(cls,st){
  const stat=st[PRIME[cls]];
  if(stat>=16)return'+10%';
  if(stat>=13)return'+5%';
  if(stat<=5) return'−10%';
  return'—';
}
function openDoors(str){
  if(str<=8)return'1-in-6';
  if(str<=12)return'2-in-6';
  if(str<=15)return'3-in-6';
  if(str<=17)return'4-in-6';
  return'5-in-6';
}

function generate(){
  const stats={STR:roll(3,6),INT:roll(3,6),WIS:roll(3,6),DEX:roll(3,6),CON:roll(3,6),CHA:roll(3,6)};
  const cls=bestClass(stats);
  let hp=r(HD[cls])+getMod(stats.CON);
  if(hp<1)hp=1;
  const gold=roll(3,6)*10;
  const alignRoll=r(6);
  const alignment=alignRoll<=3?'Lawful':alignRoll<=5?'Neutral':'Chaotic';

  // Languages
  const baseLangs=[...CLASS_LANG[cls]];
  const extraCount=Math.max(0,getMod(stats.INT));
  const usedEn=new Set(baseLangs.map(l=>l.en.toLowerCase()));
  const extraLangs=[];
  let tries=0;
  for(let i=0;i<extraCount;i++){
    while(tries<40){
      const L2=EXTRA_LANG[r(20)-1];
      if(!usedEn.has(L2.en.toLowerCase())){
        extraLangs.push(L2);
        usedEn.add(L2.en.toLowerCase());
        break;
      }
      tries++;
    }
  }

  // MU spell
  let muSpell=null;
  if(cls==='Magic-User'||cls==='Elf'){
    const keys=Object.keys(MU_SPELLS);
    muSpell=pick(keys);
  }

  C={
    name:`${pick(FIRST_NAMES)} ${pick(LAST_NAMES)}`,
    cls,stats,hp,gold,alignment,
    baseLangs,extraLangs,muSpell,
    saves:SAVES[cls],xp2:XP2[cls],
    xpB:xpBonus(cls,stats),
  };
  S={armor:null,shield:false,weapons:new Set(),gear:new Set()};
  activeTab='weapons';

  const sheet=document.getElementById('char-sheet');
  sheet.innerHTML=buildAll();
  sheet.classList.add('visible');
  setTimeout(()=>sheet.scrollIntoView({behavior:'smooth',block:'start'}),60);
  animateStats(stats);
  document.getElementById('btn-export').disabled=false;
}

function animateStats(finalStats){
  ['STR','INT','WIS','DEX','CON','CHA'].forEach((k,i)=>{
    const el=document.getElementById(`sc-${k}`);
    if(!el)return;
    el.classList.add('rolling');
    let count=0;const maxTicks=8+i*2;
    const iv=setInterval(()=>{
      el.textContent=Math.floor(Math.random()*18)+1;
      if(++count>=maxTicks){clearInterval(iv);el.textContent=finalStats[k];el.classList.remove('rolling');}
    },55);
  });
}

function weaponAllowed(w,cls){
  if(w.allowed==='all')return true;
  if(!w.allowed.includes(cls))return false;
  if(cls==='Cleric'&&w.dmg!=='—'&&!w.name.en.match(/Club|Mace|Hammer|Staff|Sling/i))return false;
  if(cls==='Magic-User'&&w.dmg!=='—'&&!w.name.en.match(/Dagger/i))return false;
  return true;
}

function buildTabContent(cls){
  if(activeTab==='weapons'){
    return WEAPONS_DATA.map(w=>{
      const ok=weaponAllowed(w,cls);
      const nm=L(w.name);
      const ck=S.weapons.has(w.name.en);
      const nt=w.note?L(w.note):'';
      return`<div class="shop-item${!ok?' disabled':''}${ck?' selected':''}">
        <input type="checkbox" ${ck?'checked':''} ${!ok?'disabled':''}
          onchange="toggleWeapon('${esc(w.name.en)}',this.checked)">
        <span class="item-name">${nm}${nt?`<span class="item-note">${nt}</span>`:''}</span>
        <span class="item-dmg">${w.dmg}</span>
        <span class="item-cost">${w.cost} gp</span>
      </div>`;
    }).join('');
  }
  if(activeTab==='armor'){
    const armorOk=CLASS_ARMOR[cls].length>0;
    const shieldOk=CLASS_ARMOR[cls].includes('shield');
    let html='';
    html+=ARMOR_ITEMS.map(a=>{
      const ok=CLASS_ARMOR[cls].includes(a.id);
      const sel=S.armor===a.id;
      return`<div class="shop-item${!ok?' disabled':''}${sel?' selected':''}" onclick="${ok?`selectArmor('${a.id}')`:''}" style="cursor:${ok?'pointer':'not-allowed'}">
        <span class="item-name">${L(a.name)}</span>
        <span class="item-dmg">AC ${a.baseAC}</span>
        <span class="item-cost">${a.cost} gp</span>
      </div>`;
    }).join('');
    html+=`<div class="shop-item${!shieldOk?' disabled':''}${S.shield?' selected':''}" onclick="${shieldOk?`toggleShield()`:''}" style="cursor:${shieldOk?'pointer':'not-allowed'}">
      <span class="item-name">${t('shield')} <span class="item-note">${t('shieldNote')}</span></span>
      <span class="item-dmg">−1 AC</span>
      <span class="item-cost">10 gp</span>
    </div>`;
    return html;
  }
  // gear
  return GEAR_DATA.map(g=>{
    const nm=L(g.name);
    const ck=S.gear.has(g.name.en);
    return`<div class="shop-item${ck?' selected':''}">
      <input type="checkbox" ${ck?'checked':''}
        onchange="toggleGear('${esc(g.name.en)}',this.checked)">
      <span class="item-name">${nm}</span>
      <span class="item-dmg"></span>
      <span class="item-cost">${g.cost} gp</span>
    </div>`;
  }).join('');
}

function switchTab(tab,btn){
  activeTab=tab;
  document.querySelectorAll('.shop-tab').forEach(t2=>t2.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('shop-body').innerHTML=buildTabContent(C.cls);
}
function toggleWeapon(name,checked){if(checked)S.weapons.add(name);else S.weapons.delete(name);refreshGold();updateInv();}
function selectArmor(id){S.armor=S.armor===id?null:id;refreshGold();refreshCombat();updateInv();document.getElementById('shop-body').innerHTML=buildTabContent(C.cls);}
function toggleShield(){S.shield=!S.shield;refreshGold();refreshCombat();updateInv();document.getElementById('shop-body').innerHTML=buildTabContent(C.cls);}
function toggleGear(name,checked){if(checked)S.gear.add(name);else S.gear.delete(name);refreshGold();updateInv();}

function refreshGold(){
  if(!C)return;
  const sp=calcSpent();
  const rm=C.gold-sp;
  const el=document.getElementById('gold-remain-val');
  const sl=document.getElementById('gold-spent-label');
  if(el){el.textContent=rm;el.className='gv'+(rm<0?' over':'');}
  if(sl&&sp>0)sl.textContent=`${t('goldSpent')}: ${sp} gp`;
  else if(sl)sl.textContent='';
}
function refreshCombat(){
  if(!C)return;
  const dexMod=getMod(C.stats.DEX);
  const ac=calcAC(S.armor,S.shield,dexMod);
  const mv=calcMove(S.armor);
  const acEl=document.getElementById('ac-val');
  const mvEl=document.getElementById('mv-val');
  const mvEncEl=document.getElementById('mv-enc');
  const armorEl=document.getElementById('armor-name');
  if(acEl)acEl.textContent=ac;
  if(mvEl)mvEl.textContent=mv;
  if(mvEncEl)mvEncEl.textContent=lang==='en'?`/ ${parseInt(mv)/3}' enc.`:`/ ${parseInt(mv)/3}' yüklü`;
  if(armorEl){
    const ai=ARMOR_ITEMS.find(a=>a.id===S.armor);
    armorEl.textContent=ai?L(ai.name):t('armorNone');
  }
}
function updateInv(){
  const el=document.getElementById('inv-list');
  if(!el)return;
  const lines=[];
  const ai=ARMOR_ITEMS.find(a=>a.id===S.armor);
  if(ai)lines.push({name:L(ai.name),cost:ai.cost});
  if(S.shield)lines.push({name:t('shield'),cost:10});
  S.weapons.forEach(n=>{const w=WEAPONS_DATA.find(x=>x.name.en===n);if(w)lines.push({name:L(w.name),cost:w.cost});});
  S.gear.forEach(n=>{const g=GEAR_DATA.find(x=>x.name.en===n);if(g)lines.push({name:L(g.name),cost:g.cost});});
  if(lines.length===0){el.innerHTML=`<p class="note">${t('noItems')}</p>`;return;}
  el.innerHTML=lines.map(l=>`<div class="inv-row"><span class="inv-name">${l.name}</span><span class="inv-cost">${l.cost} gp</span></div>`).join('');
}
function esc(s){return s.replace(/'/g,"\\'");}
