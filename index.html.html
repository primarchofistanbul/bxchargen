<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B/X D&D — Character Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@700&family=Spectral:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════════
   ROOT & RESET
════════════════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --ink: #ffffff;         /* Main background */
  --surface: #f9fafb;     /* Light neutral */
  --card: #ffffff;        /* Panels */
  --card2: #f3f4f6;       /* Secondary background */
  --border-gold: #000000; /* Sharp black borders */
  --border-dim: #e5e7eb;  /* Subtle dividers */
  
  --gold: #000000;        
  --gold-bright: #dc2626; /* Primary Accent: Red */
  --gold-dim: #6b7280;
  
  --parchment: #000000;
  --parchment-dim: #6b7280;
  
  --text: #000000;        /* Main text */
  --text-muted: #4b5563;
  --text-dim: #9ca3af;
  
  --crimson: #b91c1c;
  --crimson-bright: #dc2626;
  --emerald: #15803d;
  --emerald-bright: #22c55e;
  --sapphire: #1d4ed8;
  --sapphire-bright: #3b82f6;
  
  --r: 0px;               /* Sharp edges for minimalism */
  --r-lg: 0px;
}

html{scroll-behavior:smooth}
body{
  background:var(--ink);
  color:var(--text);
  font-family: system-ui, -apple-system, sans-serif;
  min-height:100vh;
  padding:20px 16px 60px;
  position:relative;
  overflow-x:hidden;
}

/* Remove vintage grain and vignette overlays */
body::before, body::after {
  display: none;
}

.wrapper{position:relative;z-index:1;max-width:1080px;margin:0 auto}

/* ════════════════════════════════════════════
   TYPOGRAPHY UTILITIES
════════════════════════════════════════════ */
.heading{font-family: system-ui, -apple-system, sans-serif; font-weight:700; letter-spacing:0.02em}
.heading-display{font-family: system-ui, -apple-system, sans-serif; font-weight:900; letter-spacing:0.02em; text-transform:uppercase}
.label{
  font-family: system-ui, -apple-system, sans-serif;
  font-size:0.65rem;
  font-weight:600;
  letter-spacing:0.15em;
  text-transform:uppercase;
  color:var(--parchment-dim);
}

/* ════════════════════════════════════════════
   MINIMAL DIVIDER
════════════════════════════════════════════ */
.ornament{
  text-align:center;
  color:var(--gold-dim);
  font-size:0.8rem;
  letter-spacing:0.2em;
  margin:28px 0;
  position:relative;
  text-transform:uppercase;
}
.ornament::before,.ornament::after{
  content:'';
  position:absolute;
  top:50%;
  width:calc(50% - 70px);
  height:1px;
  background: var(--border-dim);
}
.ornament::before{left:0}
.ornament::after{right:0}

/* ════════════════════════════════════════════
   HEADER
════════════════════════════════════════════ */
.site-header{
  text-align:center;
  padding:48px 20px 36px;
}
.site-header h1{
  font-family: system-ui, -apple-system, sans-serif;
  font-weight: 900;
  font-size:clamp(1.5rem,4vw,3rem);
  color:var(--text);
  letter-spacing:-0.02em;
  line-height:1.2;
  margin-bottom:10px;
  text-transform:uppercase;
}
.site-header .subtitle{
  font-family: system-ui, -apple-system, sans-serif;
  color:var(--parchment-dim);
  font-size:1rem;
  font-weight:400;
  letter-spacing:0.02em;
}

/* ════════════════════════════════════════════
   GENERATE BUTTON
════════════════════════════════════════════ */
.btn-generate{
  display:inline-flex;
  align-items:center;
  gap:10px;
  margin:24px auto 0;
  padding:14px 44px;
  background:#000000;
  color:#ffffff;
  border:2px solid #000000;
  border-radius:var(--r);
  font-family: system-ui, -apple-system, sans-serif;
  font-size:0.95rem;
  font-weight:700;
  letter-spacing:0.05em;
  text-transform:uppercase;
  cursor:pointer;
  transition:all 0.2s ease;
}
.btn-generate:hover{
  background:var(--crimson-bright);
  border-color:var(--crimson-bright);
  color:#ffffff;
}
.btn-generate:active{transform:translateY(1px)}
.btn-generate:disabled{opacity:0.5; cursor:not-allowed; background:#e5e7eb; border-color:#e5e7eb; color:#9ca3af;}
.btn-generate .dice-icon{font-size:1.1rem}

/* ════════════════════════════════════════════
   CHARACTER SHEET
════════════════════════════════════════════ */
#char-sheet{
  display:none;
  animation:sheetReveal 0.4s ease both;
}
@keyframes sheetReveal{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}

/* ════════════════════════════════════════════
   PANEL / CARD BASE
════════════════════════════════════════════ */
.panel{
  background:var(--card);
  border:2px solid var(--border-gold);
  border-radius:var(--r-lg);
  padding:24px;
  position:relative;
  margin-bottom: 20px;
}

.panel-title{
  font-family: system-ui, -apple-system, sans-serif;
  font-size:0.75rem;
  font-weight:700;
  letter-spacing:0.15em;
  text-transform:uppercase;
  color:var(--text);
  margin-bottom:20px;
  padding-bottom:12px;
  border-bottom:2px solid var(--border-gold);
}

/* ════════════════════════════════════════════
   IDENTITY BLOCK
════════════════════════════════════════════ */
.identity{
  display:flex;
  flex-wrap:wrap;
  gap:20px;
  justify-content:space-between;
  align-items:flex-start;
  margin-bottom:20px;
}
.char-name{
  font-family: system-ui, -apple-system, sans-serif;
  font-weight:900;
  font-size:clamp(1.5rem,3.5vw,2.4rem);
  color:var(--gold-bright);
  line-height:1.1;
  text-transform:uppercase;
  letter-spacing:-0.02em;
}
.char-subline{
  font-family: system-ui, -apple-system, sans-serif;
  color:var(--parchment-dim);
  font-size:0.95rem;
  margin-top:6px;
}
.meta-cluster{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  align-items:flex-start;
}
.meta-badge{
  background:var(--card);
  border:1px solid var(--border-gold);
  border-radius:var(--r);
  padding:10px 16px;
  text-align:center;
  min-width:72px;
}
.meta-badge .val{
  font-family: system-ui, -apple-system, sans-serif;
  font-size:1rem;
  font-weight:700;
  color:var(--text);
  display:block;
  line-height:1.2;
}
.meta-badge .lbl{
  font-family: system-ui, -apple-system, sans-serif;
  font-size:0.6rem;
  font-weight:600;
  letter-spacing:0.1em;
  text-transform:uppercase;
  color:var(--parchment-dim);
  display:block;
  margin-top:4px;
}
.align-lawful .val{color:var(--text)}
.align-neutral .val{color:var(--text)}
.align-chaotic .val{color:var(--gold-bright)}

/* ════════════════════════════════════════════
   COMBAT STATS ROW
════════════════════════════════════════════ */
.combat-row{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(100px,1fr));
  gap:12px;
  margin-bottom:20px;
}
.combat-tile{
  background:var(--card);
  border:2px solid var(--border-gold);
  border-radius:var(--r);
  padding:16px 12px;
  text-align:center;
}
.combat-tile .val{
  font-family: system-ui, -apple-system, sans-serif;
  font-size:2rem;
  font-weight:800;
  color:var(--text);
  line-height:1;
  display:block;
}
.combat-tile .lbl{
  font-family: system-ui, -apple-system, sans-serif;
  font-size:0.65rem;
  font-weight:700;
  letter-spacing:0.1em;
  text-transform:uppercase;
  color:var(--parchment-dim);
  margin-top:8px;
  display:block;
}
.combat-tile.hp .val{color:var(--gold-bright)}
.combat-tile.gold-tile .val{color:var(--text)}

/* ════════════════════════════════════════════
   ABILITY SCORES GRID
════════════════════════════════════════════ */
.abilities-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:12px;
  margin-bottom:20px;
}
.ability-card{
  background:var(--card);
  border:1px solid var(--border-gold);
  border-radius:var(--r-lg);
  padding:16px;
  position:relative;
}
.ability-card.prime-req{
  border:2px solid var(--gold-bright);
}
.ability-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:12px;
}
.ability-label{
  font-family: system-ui, -apple-system, sans-serif;
  font-size:0.65rem;
  font-weight:700;
  letter-spacing:0.1em;
  text-transform:uppercase;
  color:var(--parchment-dim);
}
.ability-mod{
  font-family: system-ui, -apple-system, sans-serif;
  font-size:0.85rem;
  font-weight:700;
  padding:4px 8px;
  border-radius:var(--r);
  background:var(--card2);
  border:1px solid var(--border-dim);
}
.ability-mod.pos{color:var(--text); background:var(--border-dim)}
.ability-mod.neg{color:var(--gold-bright); background:rgba(220,38,38,0.1); border-color:var(--gold-bright)}
.ability-mod.zero{color:var(--parchment-dim)}
.ability-score{
  font-family: system-ui, -apple-system, sans-serif;
  font-size:2.8rem;
  font-weight:800;
  color:var(--text);
  line-height:1;
  margin-bottom:8px;
}
.ability-score.rolling{color:var(--gold-bright);animation:pulse 0.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.prime-pip{
  font-size:0.65rem;
  color:var(--gold-bright);
  font-weight:700;
  margin-bottom:8px;
  text-transform:uppercase;
  letter-spacing:0.05em;
}
.ability-effects{
  font-size:0.75rem;
  color:var(--text-muted);
  line-height:1.5;
  font-family: system-ui, -apple-system, sans-serif;
}
.ability-effects span{color:var(--text); font-weight:600}

/* ════════════════════════════════════════════
   TWO COLUMN
════════════════════════════════════════════ */
.two-col{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
  margin-bottom:16px;
}
@media(max-width:620px){.two-col{grid-template-columns:1fr}}

/* ════════════════════════════════════════════
   TABLES
════════════════════════════════════════════ */
.sheet-table{width:100%;border-collapse:collapse;font-family: system-ui, -apple-system, sans-serif}
.sheet-table th{
  font-family: system-ui, -apple-system, sans-serif;
  font-size:0.65rem;
  font-weight:700;
  letter-spacing:0.1em;
  text-transform:uppercase;
  color:var(--text);
  padding:8px 12px;
  border-bottom:2px solid var(--border-gold);
  text-align:left;
}
.sheet-table td{
  padding:10px 12px;
  border-bottom:1px solid var(--border-dim);
  font-size:0.9rem;
  color:var(--text);
}
.sheet-table .num{
  text-align:right;
  font-weight:700;
  color:var(--text);
}
.sheet-table .muted{color:var(--text-muted)}

/* ════════════════════════════════════════════
   TAGS / LANGUAGE PILLS
════════════════════════════════════════════ */
.tag{
  display:inline-block;
  padding:4px 12px;
  background:var(--card2);
  border:1px solid var(--border-gold);
  border-radius:999px;
  font-family: system-ui, -apple-system, sans-serif;
  font-size:0.8rem;
  font-weight:600;
  color:var(--text);
  margin:4px 4px 4px 0;
}
.tag.base{background:var(--border-dim)}

/* ════════════════════════════════════════════
   ABILITY LIST (special abilities)
════════════════════════════════════════════ */
.ability-list{list-style:none; padding-left:0;}
.ability-list li{
  padding:10px 0 10px 24px;
  border-bottom:1px solid var(--border-dim);
  font-size:0.9rem;
  font-family: system-ui, -apple-system, sans-serif;
  color:var(--text);
  position:relative;
  line-height:1.6;
}
.ability-list li:last-child{border-bottom:none}
.ability-list li::before{
  content:'■';
  position:absolute;left:0;top:12px;
  color:var(--gold-bright);
  font-size:0.6rem;
}
.ability-list strong{color:var(--text);font-weight:700}

/* ════════════════════════════════════════════
   SPELL CARDS
════════════════════════════════════════════ */
.spell-card{
  background:var(--card);
  border:1px solid var(--border-gold);
  border-radius:var(--r);
  padding:16px;
  margin-bottom:12px;
}
.spell-badge{
  font-family: system-ui, -apple-system, sans-serif;
  font-size:0.6rem;
  font-weight:700;
  letter-spacing:0.1em;
  text-transform:uppercase;
  color:var(--parchment-dim);
  margin-bottom:6px;
}
.spell-name{
  font-family: system-ui, -apple-system, sans-serif;
  font-size:1rem;
  font-weight:700;
  color:var(--text);
  margin-bottom:6px;
}
.spell-desc{
  font-family: system-ui, -apple-system, sans-serif;
  font-size:0.85rem;
  color:var(--text-muted);
  line-height:1.6;
}
.spell-card.highlight{
  border-left:4px solid var(--gold-bright);
}

/* ════════════════════════════════════════════
   THIEF SKILL ROWS
════════════════════════════════════════════ */
.skill-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 0;
  border-bottom:1px solid var(--border-dim);
  font-family: system-ui, -apple-system, sans-serif;
}
.skill-row:last-child{border-bottom:none}
.skill-name{font-size:0.9rem;color:var(--text); font-weight:500}
.skill-val{
  font-size:0.9rem;
  font-weight:700;
  color:var(--text);
}

/* ════════════════════════════════════════════
   EQUIPMENT SHOP
════════════════════════════════════════════ */
.shop-header{
  display:flex;
  flex-wrap:wrap;
  justify-content:space-between;
  align-items:center;
  gap:16px;
  margin-bottom:20px;
}
.gold-tracker{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
  align-items:center;
  font-family: system-ui, -apple-system, sans-serif;
  font-size:0.9rem;
  font-weight:500;
}
.gold-tracker .start-gold{color:var(--parchment-dim)}
.gold-tracker .spent{color:var(--crimson-bright)}
.gold-tracker .remain{
  font-size:1.2rem;
  font-weight:800;
  color:var(--text);
}
.gold-tracker .remain.overbudget{color:var(--crimson-bright);animation:shake 0.3s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}

.shop-tabs{
  display:flex;
  gap:0;
  margin-bottom:-2px;
  position:relative;
  z-index:2;
}
.shop-tab{
  padding:12px 24px;
  background:var(--card2);
  border:2px solid var(--border-gold);
  border-bottom-color:var(--border-gold);
  margin-right:-2px;
  cursor:pointer;
  font-family: system-ui, -apple-system, sans-serif;
  font-size:0.7rem;
  font-weight:700;
  letter-spacing:0.1em;
  text-transform:uppercase;
  color:var(--parchment-dim);
  transition:all 0.2s;
}
.shop-tab:hover{color:var(--text);background:var(--card)}
.shop-tab.active{
  background:var(--card);
  color:var(--gold-bright);
  border-bottom-color:var(--card);
  z-index:3;
}
.shop-body{
  background:var(--card);
  border:2px solid var(--border-gold);
  padding:20px;
  position:relative;
  z-index:1;
}

.shop-item{
  display:flex;
  align-items:center;
  gap:12px;
  padding:10px 8px;
  border-bottom:1px solid var(--border-dim);
  transition:background 0.15s;
}
.shop-item:hover{background:var(--card2)}
.shop-item:last-child{border-bottom:none}
.shop-item.restricted{opacity:0.4;pointer-events:none}
.shop-check{
  width:18px;height:18px;
  accent-color:var(--gold-bright);
  cursor:pointer;
  flex-shrink:0;
}
.item-name{
  flex:1;
  font-family: system-ui, -apple-system, sans-serif;
  font-size:0.9rem;
  font-weight:500;
  color:var(--text);
}
.item-note{
  font-size:0.75rem;
  color:var(--text-muted);
  margin-left:8px;
}
.item-dmg{
  font-size:0.8rem;
  font-weight:600;
  color:var(--text-muted);
  width:48px;
  text-align:center;
}
.item-cost{
  font-size:0.9rem;
  font-weight:700;
  color:var(--text);
  width:56px;
  text-align:right;
}
.restricted-note{
  font-size:0.7rem;
  color:var(--crimson-bright);
  font-weight:600;
  margin-left:8px;
  text-transform:uppercase;
}

/* ════════════════════════════════════════════
   FOOTNOTE
════════════════════════════════════════════ */
.footnote{
  font-family: system-ui, -apple-system, sans-serif;
  font-size:0.8rem;
  color:var(--text-muted);
  line-height:1.6;
  margin-top:16px;
}

/* ════════════════════════════════════════════
   UTILITY
════════════════════════════════════════════ */
.mb12{margin-bottom:12px}
.mb16{margin-bottom:16px}
.mb20{margin-bottom:20px}
.col-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:480px){
  .col-2{grid-template-columns:1fr}
  .meta-cluster{justify-content:flex-start}
  .combat-row{grid-template-columns:repeat(3,1fr)}
}
hr.rule{border:none;border-top:1px solid var(--border-dim);margin:20px 0}
</style>
</head>
<body>
<div class="wrapper">

<!-- ══════════════════ HEADER ══════════════════ -->
<header class="site-header">
  <h1>B/X Dungeons &amp; Dragons</h1>
  <div class="subtitle">Character Generator · Moldvay Basic / Old School Essentials Compatible</div>
  <br>
  <button class="btn-generate" onclick="generate()">
    <span class="dice-icon">🎲</span> Roll New Character
  </button>
  &nbsp;
  <button class="btn-generate" onclick="exportTXT()" style="font-size:0.75rem;padding:10px 22px;opacity:0.75;margin-top:8px" id="export-btn" disabled>
    <span class="dice-icon">📄</span> Export as TXT
  </button>
</header>

<!-- ══════════════════ CHARACTER SHEET ══════════════════ -->
<div id="char-sheet"></div>

</div><!-- .wrapper -->

<script>
// ═══════════════════════════════════════════════════════
//  DATA TABLES
// ═══════════════════════════════════════════════════════

const MOD_TABLE=[[3,3,-3],[4,5,-2],[6,8,-1],[9,12,0],[13,15,1],[16,17,2],[18,18,3]];
function getMod(s){for(const[lo,hi,m]of MOD_TABLE)if(s>=lo&&s<=hi)return m;return 0;}
function fmtMod(s){const m=getMod(s);return m>0?`+${m}`:String(m);}
function modClass(s){const m=getMod(s);return m>0?'pos':m<0?'neg':'zero';}

const SAVES={
  'Fighter':   [12,13,14,15,16],
  'Cleric':    [11,12,14,16,15],
  'Magic-User':[13,14,13,16,15],
  'Thief':     [13,14,13,16,15],
  'Dwarf':     [8,9,10,13,12],
  'Elf':       [12,13,13,15,15],
  'Halfling':  [8,9,10,13,12],
};
const SAVE_NAMES=['Death Ray/Poison','Magic Wands','Paralysis/Stone','Dragon Breath','Rods/Staves/Spells'];
const SAVE_NOTES=['CON save','—','—','—','WIS mod applies'];

const HD={'Fighter':8,'Cleric':6,'Magic-User':4,'Thief':4,'Dwarf':8,'Elf':6,'Halfling':6};

const XP2={'Fighter':2000,'Cleric':1500,'Magic-User':2500,'Thief':1200,'Dwarf':2200,'Elf':4000,'Halfling':2000};

const PRIME={'Fighter':'STR','Cleric':'WIS','Magic-User':'INT','Thief':'DEX','Dwarf':'STR','Elf':'INT','Halfling':'DEX'};

const CLASS_ARMOR={
  'Fighter':   ['leather','chain','plate','shield'],
  'Cleric':    ['leather','chain','plate','shield'],
  'Magic-User':[],
  'Thief':     ['leather'],
  'Dwarf':     ['leather','chain','plate','shield'],
  'Elf':       ['leather','chain','plate','shield'],
  'Halfling':  ['leather','chain','plate','shield'],
};

// Weapon list: allowed = 'all' or array of class names
const WEAPONS=[
  {name:'Battle Axe',    cost:7,  dmg:'1d8', allowed:['Fighter','Dwarf','Elf','Halfling']},
  {name:'Club',          cost:3,  dmg:'1d4', allowed:'all'},
  {name:'Crossbow',      cost:30, dmg:'1d6', note:'ranged', allowed:['Fighter','Dwarf','Elf','Halfling','Thief']},

const r=n=>Math.floor(Math.random()*n)+1;
const d=( n,s)=>{let t=0;for(let i=0;i<n;i++)t+=r(s);return t;}
const pick=a=>a[Math.floor(Math.random()*a.length)];

function calcAC(armorId,hasShield,dexMod){
  let base=9;
  if(armorId==='leather')base=7;
  else if(armorId==='chain')base=5;
  else if(armorId==='plate')base=3;
  return base-dexMod-(hasShield?1:0);
}
function calcMove(armorId){
  if(armorId==='chain'||armorId==='plate')return "60'";
  if(armorId==='leather')return "90'";
  return "120'";
}
function calcSpent(){
  let sp=0;
  const ai=ARMOR_ITEMS.find(a=>a.id===S.armor);
  if(ai)sp+=ai.cost;
  if(S.shield)sp+=10;
  S.weapons.forEach(n=>{const w=WEAPONS.find(x=>x.name===n);if(w)sp+=w.cost;});
  S.gear.forEach(n=>{const g=GEAR.find(x=>x.name===n);if(g)sp+=g.cost;});
  return sp;
}

function classScore(cls,st){
  const{STR,INT,WIS,DEX,CON,CHA}=st;
  switch(cls){
    case'Fighter':    return STR*1.0+CON*0.35;
    case'Cleric':     return WIS*1.0+STR*0.2;
    case'Magic-User': return INT*1.0+CON*0.1;
    case'Thief':      return DEX*1.0+CHA*0.2;
    case'Dwarf':      return (STR+CON)*0.55;
    case'Elf':        return (INT+STR)*0.5;
    case'Halfling':   return (DEX+STR)*0.5;
  }return 0;
}
function bestClass(st){
  return['Fighter','Cleric','Magic-User','Thief','Dwarf','Elf','Halfling']
    .sort((a,b)=>classScore(b,st)-classScore(a,st))[0];
}

function xpBonus(cls,st){
  const stat=st[PRIME[cls]];
  if(stat>=16)return'+10% XP';
  if(stat>=13)return'+5% XP';
  if(stat<=5) return'−10% XP';
  return'No XP modifier';
}

function generate(){
  const stats={
    STR:d(3,6),INT:d(3,6),WIS:d(3,6),
    DEX:d(3,6),CON:d(3,6),CHA:d(3,6)
  };
  const cls=bestClass(stats);
  let hp=r(HD[cls])+getMod(stats.CON);
  if(hp<1)hp=1;
  const gold=d(3,6)*10;
  const alignRoll=r(6);
  const alignment=alignRoll<=3?'Lawful':alignRoll<=5?'Neutral':'Chaotic';

  // Languages
  const langs=[...CLASS_LANG[cls]];
  const ai=langs.indexOf('Alignment tongue');
  if(ai>=0)langs[ai]=`${alignment} tongue`;
  const extraCount=Math.max(0,getMod(stats.INT));
  const used=new Set(langs.map(l=>l.toLowerCase()));
  for(let i=0;i<extraCount;i++){
    let tries=0;
    while(tries<30){
      const L=EXTRA_LANG[r(20)-1];
      if(!used.has(L.toLowerCase())){langs.push(L);used.add(L.toLowerCase());break;}
      tries++;
    }
  }

  // MU spell
  let muSpell=null;
  if(cls==='Magic-User'){
    const keys=Object.keys(MU_SPELLS);
    muSpell=pick(keys);
  }

  C={
    name:`${pick(FIRST_NAMES)} ${pick(LAST_NAMES)}`,
    cls,stats,hp,gold,alignment,langs,muSpell,
    saves:SAVES[cls],xp2:XP2[cls],
    xpBonus:xpBonus(cls,stats),
  };
  S={armor:null,shield:false,weapons:new Set(),gear:new Set()};

  const sheet=document.getElementById('char-sheet');
  sheet.style.display='none';
  sheet.innerHTML=buildAll();
  sheet.style.display='block';
  // Scroll & animate scores
  setTimeout(()=>sheet.scrollIntoView({behavior:'smooth'}),50);
  animateStats(stats);
  const btn=document.getElementById('export-btn');
  if(btn)btn.disabled=false;
}

// ═══════════════════════════════════════════════════════
//  ANIMATE STAT ROLLS
// ═══════════════════════════════════════════════════════
function animateStats(finalStats){
  const keys=['STR','INT','WIS','DEX','CON','CHA'];
  keys.forEach((k,i)=>{
    const el=document.getElementById(`score-${k}`);
    if(!el)return;
    const final=finalStats[k];
    el.classList.add('rolling');
    let count=0;
    const maxTicks=10+i*2;
    const iv=setInterval(()=>{
      el.textContent=Math.floor(Math.random()*18)+1;
      count++;
      if(count>=maxTicks){
        clearInterval(iv);
        el.textContent=final;
        el.classList.remove('rolling');
      }
    },60);
  });
}

  const ac=calcAC(S.armor,S.shield,dexMod);

  const spent=calcSpent();

  return `

function buildAbilities(stats){
  const defs=[
    {k:'STR',full:'Strength',    efx:s=>`Melee to-hit: <span>${fmtMod(s)}</span> / Damage: <span>${fmtMod(s)}</span><br>Open doors: <span>${Math.max(1,Math.min(5,2+getMod(s)))}-in-6</span>`},
    {k:'INT',full:'Intelligence',efx:s=>{
      const lit=s<=3?'Illiterate':s<=5?'Barely literate':s<=8?'Native tongue only':'Literate';
      const el=Math.max(0,getMod(s));
      return `Additional languages: <span>${el}</span><br>Literacy: <span>${lit}</span>`;
    }},
    {k:'WIS',full:'Wisdom',      efx:s=>`Magic saving throw bonus: <span>${fmtMod(s)}</span><br>Applies to spells, wands, rods, staves`},
    {k:'DEX',full:'Dexterity',   efx:s=>`Missile to-hit: <span>${fmtMod(s)}</span><br>Armor Class: <span>${fmtMod(s)}</span> / Initiative: <span>${fmtMod(s)}</span>`},
    {k:'CON',full:'Constitution',efx:s=>`HP per hit die: <span>${fmtMod(s)}</span><br>Minimum 1 HP even on bad rolls`},
    {k:'CHA',full:'Charisma',    efx:s=>{
      const ret=[,'1','2','3','4','5','6','7'][Math.min(7,Math.max(1,4+getMod(s)))];
      const mor=[,'4','5','6','7','8','9','10'][Math.min(6,Math.max(1,4+getMod(s)))];
      return `NPC reaction: <span>${fmtMod(s)}</span><br>Max retainers: <span>${ret||'4'}</span> / Morale: <span>${mor||'7'}</span>`;
    }},
  ];
  const pr=PRIME[C.cls];
  let h='<div class="abilities-grid mb16">';
  defs.forEach(({k,full,efx})=>{
    const s=stats[k];
    const isPrime=k===pr;
    h+=`
    <div class="ability-card${isPrime?' prime-req':''}">
      <div class="ability-header">
        <div class="ability-label">${k} &mdash; ${full}</div>
        <div class="ability-mod ${modClass(s)}">${fmtMod(s)}</div>
      </div>
      <div class="ability-score" id="score-${k}">${s}</div>
      ${isPrime?`<div class="prime-pip">★ Prime Requisite</div>`:''}
      <div class="ability-effects">${efx(s)}</div>
    </div>`;
  });
  h+='</div>';
  return h;
}

}

      <div class="spell-desc">${MU_SPELLS[muSpell]}</div>
    </div>
    <div class="footnote">Magic-users may memorize 1 spell per day at 1st level. A memorized spell is erased from memory upon casting and must be re-memorized. Both spells are recorded in the character's spell book.</div>
  </div>`;
}

function buildThiefSkills(){
  const rows=THIEF_SKILLS.map(x=>`
    <div class="skill-row">
      <div class="skill-name">${x.s}</div>
      <div class="skill-val">${x.v}</div>
    </div>`).join('');
  return `
  <div class="panel mb12">
    <div class="panel-title">Thief Skills &mdash; Level 1</div>
    ${rows}
    <div class="footnote" style="margin-top:10px">All skills improve each level. Backstab requires attacking from behind or by surprise; victim must be unaware of the attack.</div>
  </div>`;
}

function buildTurning(){
  const rows=CLERIC_TURN.map(([u,t])=>`
    <tr>
      <td>${u}</td>
      <td class="num ${t==='—'?'muted':''}">${t==='—'?'Cannot turn':t+'+'}</td>
    </tr>`).join('');
  return `
  <div class="panel mb12">
    <div class="panel-title">Turn Undead &mdash; Cleric Level 1</div>
    <table class="sheet-table">
      <thead><tr><th>Undead Type</th><th>Roll 2d6 ≥</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="footnote" style="margin-top:10px">Roll 2d6 each round when facing undead. Success drives them away. A natural 12 (double six) destroys the undead outright. Cleric gains spells from 2nd level onward.</div>
  </div>`;
}

// ═══════════════════════════════════════════════════════
//  SHOP
// ═══════════════════════════════════════════════════════
function buildShop(cls,startGold,spent,remain){
  return `
  <div class="shop-header">
    <div></div>
    <div class="gold-tracker">
      <span class="start-gold">Treasury: <strong>${startGold} gp</strong></span>
      <span class="spent">Spent: <strong id="spent-val">${spent} gp</strong></span>
      <span class="remain${remain<0?' overbudget':''}" id="remain-shop">${remain} gp remaining</span>
    </div>
  </div>
  <div class="shop-tabs">
    <div class="shop-tab${activeTab==='weapons'?' active':''}" onclick="switchTab('weapons')">⚔ Weapons</div>
    <div class="shop-tab${activeTab==='armor'?' active':''}" onclick="switchTab('armor')">🛡 Armor</div>
    <div class="shop-tab${activeTab==='gear'?' active':''}" onclick="switchTab('gear')">🎒 Gear</div>
  </div>
  <div class="shop-body" id="shop-body">
    ${buildTabContent(cls)}
  </div>`;
}

function buildTabContent(cls){
  if(activeTab==='weapons') return buildWeaponTab(cls);
  if(activeTab==='armor')   return buildArmorTab(cls);
  return buildGearTab();
}

function buildWeaponTab(cls){
  return WEAPONS.map(w=>{
    const ok=w.allowed==='all'||w.allowed.includes(cls);
    const ck=S.weapons.has(w.name);
    return `
    <div class="shop-item${!ok?' restricted':''}">
      <input type="checkbox" class="shop-check" ${ck?'checked':''} ${!ok?'disabled':''}
        onchange="toggleWeapon('${esc(w.name)}',this.checked)">
      <div class="item-name">${w.name}${w.note?`<span class="item-note">(${w.note})</span>`:''}
        ${!ok?`<span class="restricted-note">— not for ${cls}</span>`:''}</div>
      <div class="item-dmg">${w.ammo?'ammo':w.dmg}</div>
      <div class="item-cost">${w.cost} gp</div>
    </div>`;
  }).join('');
}

function buildArmorTab(cls){
  const allowed=CLASS_ARMOR[cls];
  let h='';
  // Radio: No armor
  h+=`<div class="shop-item">
    <input type="radio" name="armorsel" class="shop-check" value="none"
      ${!S.armor?'checked':''} onchange="selectArmor(null)">
    <div class="item-name">No Armor</div>
    <div class="item-dmg" style="color:var(--text-dim)">AC 9</div>
    <div class="item-cost">—</div>
  </div>`;
  ARMOR_ITEMS.forEach(a=>{
    const ok=allowed.includes(a.id);
    const ck=S.armor===a.id;
    h+=`<div class="shop-item${!ok?' restricted':''}">
      <input type="radio" name="armorsel" class="shop-check" value="${a.id}"
        ${ck?'checked':''} ${!ok?'disabled':''} onchange="selectArmor('${a.id}')">
      <div class="item-name">${a.name}${!ok?`<span class="restricted-note">— not for ${cls}</span>`:''}</div>
      <div class="item-dmg" style="color:var(--text-dim)">AC ${a.baseAC}</div>
      <div class="item-cost">${a.cost} gp</div>
    </div>`;
  });
  h+='<hr class="rule">';
  const shieldOk=allowed.includes('shield');
  h+=`<div class="shop-item${!shieldOk?' restricted':''}">
    <input type="checkbox" class="shop-check" ${S.shield?'checked':''} ${!shieldOk?'disabled':''}
      onchange="toggleShield(this.checked)">
    <div class="item-name">Shield${!shieldOk?`<span class="restricted-note">— not for ${cls}</span>`:''}</div>
    <div class="item-dmg" style="color:var(--text-dim)">−1 AC</div>
    <div class="item-cost">10 gp</div>
  </div>`;
  return h;
}

function buildGearTab(){
  return GEAR.map(g=>{
    const ck=S.gear.has(g.name);
    return `<div class="shop-item">
      <input type="checkbox" class="shop-check" ${ck?'checked':''}
        onchange="toggleGear('${esc(g.name)}',this.checked)">
      <div class="item-name">${g.name}</div>
      <div class="item-dmg"></div>
      <div class="item-cost">${g.cost} gp</div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════════════
//  SHOP INTERACTION
// ═══════════════════════════════════════════════════════
function esc(s){return s.replace(/'/g,"\\'");}

function switchTab(tab){
  activeTab=tab;
  document.querySelectorAll('.shop-tab').forEach(t=>{
    const match=(tab==='weapons'&&t.textContent.includes('Weapon'))||
                (tab==='armor'&&t.textContent.includes('Armor'))||
                (tab==='gear'&&t.textContent.includes('Gear'));
    t.classList.toggle('active',match);
  });
  document.getElementById('shop-body').innerHTML=buildTabContent(C.cls);
}

function toggleWeapon(name,checked){
  if(checked)S.weapons.add(name);else S.weapons.delete(name);
  refreshGold();
}
function selectArmor(id){
  S.armor=id;
  refreshGold();
  refreshCombat();
}
function toggleShield(v){
  S.shield=v;
  refreshGold();
  refreshCombat();
}
function toggleGear(name,checked){
  if(checked)S.gear.add(name);else S.gear.delete(name);
  refreshGold();
}

function refreshGold(){
  const sp=calcSpent();
  const rm=C.gold-sp;
  const el=document.getElementById('remain-shop');
  const sv=document.getElementById('spent-val');
  const rv=document.getElementById('remain-val');
  if(el){el.textContent=`${rm} gp remaining`;el.className='remain'+(rm<0?' overbudget':'');}
  if(sv)sv.textContent=`${sp} gp`;
  if(rv){rv.textContent=rm;rv.style.color=rm<0?'var(--crimson-bright)':'var(--gold-bright)';}
}

function refreshCombat(){
  const dexMod=getMod(C.stats.DEX);
  const ac=calcAC(S.armor,S.shield,dexMod);
  const mv=calcMove(S.armor);
  const acEl=document.getElementById('ac-val');
  const mvEl=document.getElementById('mv-val');
  if(acEl)acEl.textContent=ac;
  if(mvEl)mvEl.textContent=mv;
}

// ═══════════════════════════════════════════════════════
//  TXT EXPORT
// ═══════════════════════════════════════════════════════
function exportTXT(){
  if(!C)return;
  const{name,cls,stats,hp,gold,alignment,langs,muSpell,saves,xpBonus}=C;
  const dexMod=getMod(stats.DEX);
  const ac=calcAC(S.armor,S.shield,dexMod);
  const mv=calcMove(S.armor);
  const spent=calcSpent();
  const remaining=gold-spent;
  const armorName=ARMOR_ITEMS.find(a=>a.id===S.armor)?.name||'None';

  const line=(n=60)=>'─'.repeat(n);
  const header=(t)=>`\n${line()}\n  ${t.toUpperCase()}\n${line()}\n`;
  const row=(label,val,pad=30)=>`  ${(label+':').padEnd(pad)}${val}`;
  const fm=(s)=>{const m=getMod(s);return m>0?`+${m}`:String(m);}

  const MOD_EFFECTS={
    STR:`Melee to-hit/dmg ${fm(stats.STR)} | Open Doors: ${stats.STR<=8?'1-in-6':stats.STR<=12?'2-in-6':stats.STR<=15?'3-in-6':stats.STR<=17?'4-in-6':'5-in-6'}`,
    INT:`Extra languages: +${Math.max(0,getMod(stats.INT))} | ${stats.INT>=9?'Literate (reads & writes)':'Illiterate'}`,
    WIS:`Magic saves ${fm(stats.WIS)} | ${stats.WIS>=13?'Strong divine attunement':stats.WIS<=8?'Weak willpower':'Average willpower'}`,
    DEX:`Missile to-hit ${fm(stats.DEX)} | AC ${fm(stats.DEX)} | Initiative ${fm(stats.DEX)}`,
    CON:`HP per die ${fm(stats.CON)} | ${stats.CON>=15?'Vigorous constitution':stats.CON<=8?'Sickly constitution':'Average constitution'}`,
    CHA:`NPC reaction ${fm(stats.CHA)} | Max retainers: ${stats.CHA<=3?1:stats.CHA<=5?2:stats.CHA<=8?3:stats.CHA<=12?4:stats.CHA<=15?5:stats.CHA<=17?6:7} | Retainer morale: ${stats.CHA<=3?4:stats.CHA<=5?5:stats.CHA<=8?6:stats.CHA<=12?7:stats.CHA<=15?8:stats.CHA<=17?9:10}`,
  };

  // Weapon list
  const weaponLines=S.weapons.size>0
    ?[...S.weapons].map(n=>{const w=WEAPONS.find(x=>x.name===n);return `  - ${n} (${w?.dmg||'—'}, ${w?.cost||'?'} gp)`;}).join('\n')
    :'  (none)';

  // Gear list
  const gearLines=S.gear.size>0
    ?[...S.gear].map(n=>{const g=GEAR.find(x=>x.name===n);return `  - ${n} (${g?.cost||'?'} gp)`;}).join('\n')
    :'  (none)';

  // Equipment summary
  const shieldLine=S.shield?'\n  - Shield (10 gp)':'';

  // Abilities (strip HTML tags)
  const stripTags=s=>s.replace(/<[^>]+>/g,'');
  const abils=(CLASS_ABILITIES[cls]||[]).map(a=>`  • ${stripTags(a)}`).join('\n');

  // Thief skills
  const thiefBlock=cls==='Thief'?`\nTHIEF SKILLS (Level 1)\n${line()}\n`+
    THIEF_SKILLS.map(t=>`  ${(t.s+':').padEnd(24)}${t.v}`).join('\n')+'\n':'';

  // Cleric turning
  const clericBlock=cls==='Cleric'?`\nTURN UNDEAD TABLE (Level 1)\n${line()}\n`+
    CLERIC_TURN.map(([u,v])=>`  ${(u+':').padEnd(20)}${v}`).join('\n')+'\n':'';

  // Spell block
  let spellBlock='';
  if(cls==='Magic-User'&&muSpell){
    spellBlock=`\nSPELLS\n${line()}\n`+
      `  Read Magic (always memorized)\n`+
      `  ${muSpell}\n\n`+
      `  ${muSpell}: ${MU_SPELLS[muSpell]}\n`;
  }
  if(cls==='Elf'&&muSpell){
    spellBlock=`\nSPELLS (Elf — Magic-User spells)\n${line()}\n`+
      `  Read Magic (always memorized)\n`+
      `  ${muSpell}\n\n`+
      `  ${muSpell}: ${MU_SPELLS[muSpell]}\n`;
  }

  const txt=
`${'═'.repeat(60)}
  B/X DUNGEONS & DRAGONS — CHARACTER RECORD
  Moldvay Basic / Old School Essentials Compatible
${'═'.repeat(60)}
${header('Identity')}
${row('Name', name)}
${row('Class', `${cls} (Level 1)`)}
${row('Alignment', alignment)}
${row('Hit Points', `${hp} (d${HD[cls]}${getMod(stats.CON)!==0?` ${getMod(stats.CON)>0?'+':''}${getMod(stats.CON)} CON`:''})`)}
${row('Experience Bonus', xpBonus)}
${row('XP to Level 2', String(C.xp2))}
${header('Ability Scores')}
  SCORE  MOD   EFFECTS
  ${line(56)}
${['STR','INT','WIS','DEX','CON','CHA'].map(k=>`  ${k}:  ${String(stats[k]).padEnd(4)}  ${fm(stats[k]).padEnd(4)}  ${MOD_EFFECTS[k]}`).join('\n')}
${header('Combat')}
${row('Armor Class', `${ac}  (${armorName}${S.shield?', Shield':''})`)}
${row('Movement', mv)}
${row('THAC0', '19')}
${row('Melee Attack Bonus', fm(stats.STR))}
${row('Missile Attack Bonus', fm(stats.DEX))}
${header('Saving Throws')}
${SAVE_NAMES.map((n,i)=>`  ${(n+':').padEnd(32)}${saves[i]}`).join('\n')}
  (WIS modifier ${fm(stats.WIS)} applies to saves vs. Rods/Staves/Spells)
${header('Languages')}
  ${langs.join(', ')}
${header('Class Abilities — ' + cls)}
${abils}
${thiefBlock}${clericBlock}${spellBlock}
${header('Equipment')}
  Starting Gold:    ${gold} gp
  Gold Spent:       ${spent} gp
  Gold Remaining:   ${remaining} gp

  ARMOR:
  - ${armorName}${shieldLine}

  WEAPONS:
${weaponLines}

  GEAR:
${gearLines}
${line(60)}
  Generated by B/X Character Generator
  Compatible with Moldvay Basic D&D and Old School Essentials
${line(60)}
`;

  const blob=new Blob([txt],{type:'text/plain;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`${name.replace(/\s+/g,'_')}_BX_Character.txt`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
</script>
</body>
</html>
